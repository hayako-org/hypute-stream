name: Hypute Evaluation Workflow

on:
  workflow_dispatch:

jobs:
  validate-environment:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Toolchain Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Build Targets (Release Mode)
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)

      - name: Execute Environmental Verification
        run: |
          cd build
          ./hypute_eval
