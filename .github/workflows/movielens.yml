name: Hypute MovieLens Benchmark

on:
  workflow_dispatch:

jobs:
  run-streaming-benchmark:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Toolchain Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake unzip curl time

      - name: Download Data Asset
        run: |
          cd benchmarks/movielens
          chmod +x dataset_download.sh
          ./dataset_download.sh

      - name: Build Targets (Release Mode)
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)

      - name: Profile Traditional Engine (Memory & Ingestion)
        run: |
          cd build
          /usr/bin/time -v ./benchmark_runner traditional

      - name: Profile Hypute Engine (Memory & Ingestion)
        run: |
          cd build
          /usr/bin/time -v ./benchmark_runner hypute
